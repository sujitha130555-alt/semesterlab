name: Multi Job Workflow

on:
push:
branches:
- main

jobs:
test:
runs-on: ubuntu-latest
steps:
- name: Checkout code
uses: actions/checkout@v3

```
  - name: Run tests
    run: echo "Running tests..."
```

deploy:
runs-on: ubuntu-latest
needs: test   
steps:
- name: Deploy
run: echo "Deploying application..."

post-test:
runs-on: ubuntu-latest
needs: deploy   
steps:
- name: Post deployment testing
run: echo "Running post deployment tests..."

